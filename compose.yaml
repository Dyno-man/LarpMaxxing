services:
  larpmaxxing:
    build: .
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3000
      DATA_DIR: /app/data
      TRUST_PROXY: 1
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - larpmaxxing_data:/app/data

volumes:
  larpmaxxing_data:
